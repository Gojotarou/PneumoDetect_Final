<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload - PneumoDetect AI</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">P</div>
                <div class="logo-text">
                    <h2>PneumoDetect</h2>
                    <p>AI Platform</p>
                </div>
            </div>
            <nav class="nav-links">
                <a href="{{ url_for('dashboard') }}"><span class="nav-icon"><img src="{{ url_for('static', filename='images/dashboard.png') }}" alt="Dashboard"></span>Dashboard</a>
                <a href="{{ url_for('new_analysis_upload') }}" class="active"><span class="nav-icon"><img src="{{ url_for('static', filename='images/upload.png') }}" alt="New Analysis"></span>New Analysis</a>
                <a href="{{ url_for('report') }}"><span class="nav-icon"><img src="{{ url_for('static', filename='images/history.png') }}" alt="Patient History"></span>Patient History</a>
                <a href="{{ url_for('alerts') }}"><span class="nav-icon"><img src="{{ url_for('static', filename='images/alerts.png') }}" alt="Alerts"></span>Alerts</a>
            </nav>
            <div class="user-info">
                <div class="user-avatar">Dr</div>
                <div class="user-details">
                    <h3>Dr. Sarah Johnson</h3>
                    <p>drsarahjohnson@hospital.com</p>
                </div>
            </div>
            <button class="logout-btn">Logout</button>
        </aside>

        <main class="main-content">
            <div class="top-header">
                <h1>Upload Files</h1>
                <p>Upload X-ray images for analysis</p>
            </div>

            <div class="content-wrapper">
                <div class="card">
                    <div class="card-header">
                        <h2>File Upload</h2>
                        <p>Coming soon - Batch upload interface</p>
                    </div>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
