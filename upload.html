<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload X-ray - MediScan AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <h2>MediScan AI</h2>
            <nav class="nav-links">
                <a href="dashboard.html">Dashboard</a>
                <a href="upload.html" class="active">Upload X-ray</a>
                </nav>
        </aside>

        <main class="main-content">
            <div style="margin-bottom: 20px;">
                <span style="color: #888;">Dashboard > </span> <strong>Upload X-ray</strong>
            </div>

            <div class="card">
                <h3>Upload Chest X-ray</h3>
                <p style="margin-bottom: 20px; color: #666;">Supported formats: DICOM, JPG, PNG</p>
                
                <div class="upload-zone" id="drop-zone">
                    <p style="font-size: 1.2rem;">Drag & Drop files here</p>
                    <p>or</p>
                    <button class="btn btn-outline">Select File</button>
                    </div>
                
                <div style="margin-top: 20px; display: none;" id="preview-area">
                    <p><strong>Selected:</strong> patient_xray_001.jpg</p>
                </div>

                <div style="margin-top: 30px; text-align: right;">
                    <a href="results.html" class="btn btn-primary">Run Prediction</a>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
